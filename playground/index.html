<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>moholy.js — Signal-Driven Shader Visuals</title>
  <meta name="description" content="Tiny WebGL library that maps real-time data signals to shader visual parameters. Named after Laszlo Moholy-Nagy.">
  <style>
    :root {
      --ink: #09090b;
      --graphite: #18181b;
      --surface: #0a0a0c;
      --surface-raised: #141416;
      --surface-hover: #1c1c1e;
      --accent: #00ccaa;
      --accent-dim: #00997a;
      --text: #e4e4e7;
      --text-dim: #71717a;
      --border: #27272a;
      --mono: 'Geist Mono', 'SF Mono', 'Fira Code', monospace;
      --sans: 'Geist', 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--surface);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      overflow: hidden;
    }

    /* Layout */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr 200px;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--graphite);
    }

    .header h1 {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .header-meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .header-meta a {
      color: var(--accent-dim);
      text-decoration: none;
    }

    .header-meta a:hover {
      color: var(--accent);
    }

    /* Editor panel */
    .editor-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-raised);
    }

    .panel-header span {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .presets {
      display: flex;
      gap: 6px;
    }

    .preset-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:hover, .preset-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--surface-hover);
    }

    .editor-area {
      flex: 1;
      overflow: auto;
    }

    .editor-area textarea {
      width: 100%;
      height: 100%;
      padding: 16px;
      background: var(--surface);
      color: var(--accent);
      border: none;
      resize: none;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
      outline: none;
    }

    .editor-area textarea::selection {
      background: rgba(0, 204, 170, 0.2);
    }

    /* Preview canvas */
    .preview-panel {
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .preview-panel canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .preview-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      pointer-events: none;
    }

    /* Signal inspector */
    .inspector {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      background: var(--graphite);
      display: flex;
      flex-direction: column;
    }

    .inspector .panel-header {
      flex-shrink: 0;
    }

    .inspector-body {
      flex: 1;
      display: flex;
      align-items: stretch;
      padding: 12px 16px;
      gap: 24px;
      overflow-x: auto;
    }

    .channel-viz {
      flex: 1;
      min-width: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .channel-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .channel-bar-wrap {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }

    .channel-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--accent);
      opacity: 0.7;
      transition: height 0.05s linear;
    }

    .channel-value {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Run button */
    .run-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 14px;
      border: 1px solid var(--accent);
      border-radius: 2px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.15s;
    }

    .run-btn:hover {
      background: var(--accent);
      color: var(--ink);
    }

    .error-banner {
      padding: 8px 16px;
      background: #331111;
      color: #ff6666;
      font-family: var(--mono);
      font-size: 12px;
      display: none;
    }

    .error-banner.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1><span>moholy</span>.js</h1>
      <div class="header-meta">
        signal-driven shader visuals
        &middot;
        <a href="https://github.com/lapbrian2/moholy" target="_blank">github</a>
        &middot;
        <a href="https://www.npmjs.com/package/moholy" target="_blank">npm</a>
      </div>
    </header>

    <div class="editor-panel">
      <div class="panel-header">
        <span>code</span>
        <div style="display: flex; gap: 8px; align-items: center;">
          <div class="presets">
            <button class="preset-btn active" data-preset="clock">clock</button>
            <button class="preset-btn" data-preset="audio">audio</button>
            <button class="preset-btn" data-preset="mouse">mouse</button>
          </div>
          <button class="run-btn" id="runBtn">run</button>
        </div>
      </div>
      <div class="error-banner" id="errorBanner"></div>
      <div class="editor-area">
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
    </div>

    <div class="preview-panel">
      <canvas id="preview"></canvas>
      <div class="preview-overlay" id="fps">--fps</div>
    </div>

    <div class="inspector">
      <div class="panel-header">
        <span>signal inspector</span>
      </div>
      <div class="inspector-body" id="inspectorBody">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
